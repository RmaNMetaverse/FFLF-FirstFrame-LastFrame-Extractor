name: Build & Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact-name: FFLF-Extractor-Windows
          - os: ubuntu-latest
            platform: linux
            artifact-name: FFLF-Extractor-Linux
          - os: macos-latest
            platform: mac
            artifact-name: FFLF-Extractor-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Electron App (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron App (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron App (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            dist/*.exe
            dist/*.AppImage
            dist/*.dmg
          if-no-files-found: warn
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Release job — runs only when a version tag (v*) is pushed
  # ──────────────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets

          # Windows — portable .exe
          find artifacts/FFLF-Extractor-Windows -name '*.exe' -exec cp {} release-assets/ \; 2>/dev/null || true

          # Linux — .AppImage
          find artifacts/FFLF-Extractor-Linux -name '*.AppImage' -exec cp {} release-assets/ \; 2>/dev/null || true

          # macOS — .dmg
          find artifacts/FFLF-Extractor-macOS -name '*.dmg' -exec cp {} release-assets/ \; 2>/dev/null || true

          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
