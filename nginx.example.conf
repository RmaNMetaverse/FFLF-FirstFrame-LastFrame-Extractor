# FFLF Extractor — nginx reverse proxy configuration
#
# Place this file in /etc/nginx/sites-available/fflf-extractor
# Then symlink:  ln -s /etc/nginx/sites-available/fflf-extractor /etc/nginx/sites-enabled/
# Test config:   nginx -t
# Reload nginx:  systemctl reload nginx

server {
    listen 80;
    server_name fflf.local;   # Change to your server's hostname or IP

    # Max upload size — match the server's multer limit (2GB)
    client_max_body_size 2G;

    # Increase timeouts for large file uploads and FFmpeg processing
    proxy_read_timeout    300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
